name: Deploy GitHub Pages

on:
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - uses: actions/configure-pages@v5

            - run: npm install --global yarn@1.22.22
            - run: yarn install --frozen-lockfile
            - run: printf '\n' | yarn download-caches
            - run: yarn build
              env:
                  CI: false
                  PUBLIC_URL: /rs-map-viewer
            - run: cp -R caches build/caches

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: ./build

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
